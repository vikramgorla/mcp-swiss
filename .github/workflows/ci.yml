name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-build:
    name: lint-build (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript build
        run: npm run build

      - name: Check dist output exists
        run: |
          test -f dist/index.js || (echo "dist/index.js missing" && exit 1)
          test -f dist/modules/transport.js || (echo "transport module missing" && exit 1)
          test -f dist/modules/weather.js || (echo "weather module missing" && exit 1)
          test -f dist/modules/geodata.js || (echo "geodata module missing" && exit 1)
          test -f dist/modules/companies.js || (echo "companies module missing" && exit 1)

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint-build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit + protocol tests
        run: npm test -- --reporter=verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/
          retention-days: 7

  integration-test:
    name: integration-test
    runs-on: ubuntu-latest
    needs: lint-build
    # Only run on push to main/develop (not on every PR to save API quota)
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run integration tests (live Swiss APIs)
        run: npm run test:integration
        timeout-minutes: 3

  security:
    name: security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
