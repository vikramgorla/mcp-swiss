name: Publish to MCP Registry

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write  # Required for GitHub OIDC authentication

# Only one registry publish at a time
concurrency:
  group: mcp-registry
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for npm propagation
        run: sleep 90

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Authenticate with MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish server.json to MCP Registry
        run: mcp-publisher publish server.json
