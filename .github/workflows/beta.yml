name: Beta Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [develop]

jobs:
  beta:
    name: Publish Beta to npm
    runs-on: ubuntu-latest
    # Only run if CI succeeded AND was a push event (not PR)
    # Skip automated dev-version bumps to avoid infinite loop
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      !contains(github.event.workflow_run.head_commit.message, 'chore: bump dev version')

    steps:
      - uses: actions/checkout@v6
        with:
          ref: develop

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish beta
        run: |
          # Generate beta version: base-version + beta.timestamp
          BASE_VERSION=$(node -p 'require("./package.json").version')
          BETA_VERSION="${BASE_VERSION}-beta.$(date +%Y%m%d%H%M%S)"
          npm version "$BETA_VERSION" --no-git-tag-version
          npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
