name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build, Release & Publish
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Get version
        id: version
        run: echo "version=$(node -e 'process.stdout.write(require("./package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v8
        with:
          script: |
            const tag = `v${process.env.VERSION}`;
            // Create tag if it doesn't exist
            try {
              await github.rest.git.getRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${tag}` });
            } catch {
              await github.rest.git.createRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `refs/tags/${tag}`, sha: context.sha });
            }
            // Create release (skip if exists)
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner, repo: context.repo.repo,
                tag_name: tag, name: `mcp-swiss ${tag}`,
                generate_release_notes: true, draft: false, prerelease: false,
              });
            } catch (e) {
              if (e.status === 422) { console.log(`Release ${tag} already exists, skipping`); }
              else { throw e; }
            }
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Check if this version is already published
          if npm view "mcp-swiss@${VERSION}" version 2>/dev/null; then
            echo "⚠️ mcp-swiss@${VERSION} already published, skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump develop to next dev version
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin develop
          git checkout develop
          git pull origin develop
          
          # Merge main into develop to pick up the merge commit from the release PR
          git merge origin/main --no-edit

          CURRENT=$(node -p "require('./package.json').version")
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3 | cut -d- -f1)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-dev"

          BRANCH="chore/bump-dev-${NEXT_VERSION}"
          git checkout -b "$BRANCH"

          npm version "$NEXT_VERSION" --no-git-tag-version
          node -e "const f='server.json';const d=require('./'+f);d.version='${NEXT_VERSION}';d.packages[0].version='${NEXT_VERSION}';require('fs').writeFileSync(f,JSON.stringify(d,null,2)+'\n')"

          git add -A
          git commit -m "chore: bump dev version to ${NEXT_VERSION}"
          git push origin "$BRANCH"

          gh pr create --base develop --head "$BRANCH" \
            --title "chore: bump dev version to ${NEXT_VERSION}" \
            --body "Automated version bump after release v${CURRENT}. Merge when CI passes."

          echo "✅ Dev bump PR created. It will be merged after CI passes."

  docker:
    name: Docker (Hub + GHCR)
    needs: release
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tags
        id: tags
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          MINOR=$(echo $VERSION | cut -d. -f1-2)
          echo "minor=$MINOR" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            vikramgorla/mcp-swiss:${{ needs.release.outputs.version }}
            vikramgorla/mcp-swiss:${{ steps.tags.outputs.minor }}
            vikramgorla/mcp-swiss:latest
            ghcr.io/vikramgorla/mcp-swiss:${{ needs.release.outputs.version }}
            ghcr.io/vikramgorla/mcp-swiss:${{ steps.tags.outputs.minor }}
            ghcr.io/vikramgorla/mcp-swiss:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=mcp-swiss
            org.opencontainers.image.description=Swiss open data MCP server — 68 tools, zero API keys
            org.opencontainers.image.source=https://github.com/vikramgorla/mcp-swiss
            org.opencontainers.image.licenses=MIT

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: vikramgorla/mcp-swiss
          short-description: "Swiss open data MCP server — 68 tools, 20 modules, zero API keys"
          readme-filepath: ./README.md

  mcpb:
    name: MCPB Bundle
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Build MCPB bundle
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          BUNDLE_DIR=$(mktemp -d)

          cp -r dist/ "${BUNDLE_DIR}/dist/"
          cp -r node_modules/ "${BUNDLE_DIR}/node_modules/"
          cp package.json "${BUNDLE_DIR}/"
          cp manifest.json "${BUNDLE_DIR}/"
          [ -d "assets" ] && cp -r assets/ "${BUNDLE_DIR}/assets/" || true

          cd "${BUNDLE_DIR}"
          zip -qr "${GITHUB_WORKSPACE}/mcp-swiss-${VERSION}.mcpb" . -x "*.git*" "*.DS_Store"
          cp "${GITHUB_WORKSPACE}/mcp-swiss-${VERSION}.mcpb" "${GITHUB_WORKSPACE}/mcp-swiss.mcpb"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: |
            mcp-swiss-${{ needs.release.outputs.version }}.mcpb
            mcp-swiss.mcpb
