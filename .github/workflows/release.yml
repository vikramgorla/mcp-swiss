name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Build, Release & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Get version
        id: version
        run: echo "version=$(node -e 'process.stdout.write(require("./package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${process.env.VERSION}`;
            // Create tag if it doesn't exist
            try {
              await github.rest.git.getRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${tag}` });
            } catch {
              await github.rest.git.createRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `refs/tags/${tag}`, sha: context.sha });
            }
            // Create release (skip if exists)
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner, repo: context.repo.repo,
                tag_name: tag, name: `mcp-swiss ${tag}`,
                generate_release_notes: true, draft: false, prerelease: false,
              });
            } catch (e) {
              if (e.status === 422) { console.log(`Release ${tag} already exists, skipping`); }
              else { throw e; }
            }
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump develop to next dev version
        run: |
          RELEASED_VERSION="${{ steps.version.outputs.version }}"
          echo "Released: $RELEASED_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch and checkout develop
          git fetch origin develop
          git checkout develop

          # Compute next patch version (e.g. 0.1.7 -> 0.1.8-dev)
          NEXT_VERSION=$(node -e "
            const [major, minor, patch] = '$RELEASED_VERSION'.split('.').map(Number);
            process.stdout.write(major + '.' + minor + '.' + (patch + 1) + '-dev');
          ")
          echo "Next dev version: $NEXT_VERSION"

          # Write new version into package.json without creating a git tag
          npm version "$NEXT_VERSION" --no-git-tag-version

          git add package.json package-lock.json
          git commit -m "chore: bump dev version to $NEXT_VERSION [skip ci]"
          git push origin develop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
