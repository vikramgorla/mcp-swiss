name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Build, Release & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Get version
        id: version
        run: echo "version=$(node -e 'process.stdout.write(require("./package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${process.env.VERSION}`;
            // Create tag if it doesn't exist
            try {
              await github.rest.git.getRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${tag}` });
            } catch {
              await github.rest.git.createRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `refs/tags/${tag}`, sha: context.sha });
            }
            // Create release (skip if exists)
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner, repo: context.repo.repo,
                tag_name: tag, name: `mcp-swiss ${tag}`,
                generate_release_notes: true, draft: false, prerelease: false,
              });
            } catch (e) {
              if (e.status === 422) { console.log(`Release ${tag} already exists, skipping`); }
              else { throw e; }
            }
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump develop to next dev version
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin develop
          git checkout develop
          git pull origin develop

          # Get current version and compute next
          CURRENT=$(node -p "require('./package.json').version")
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3 | cut -d- -f1)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-dev"

          # Create bump branch
          BRANCH="chore/bump-dev-${NEXT_VERSION}"
          git checkout -b "$BRANCH"

          npm version "$NEXT_VERSION" --no-git-tag-version
          # Also update server.json
          node -e "const f='server.json';const d=require('./'+f);d.version='${NEXT_VERSION}';d.packages[0].version='${NEXT_VERSION}';require('fs').writeFileSync(f,JSON.stringify(d,null,2)+'\n')"

          git add -A
          git commit -m "chore: bump dev version to ${NEXT_VERSION} [skip ci]"
          git push origin "$BRANCH"

          # Create and auto-merge PR (or push directly if gh merge fails)
          PR_URL=$(gh pr create --base develop --head "$BRANCH" --title "chore: bump dev version to ${NEXT_VERSION}" --body "Automated version bump after release." 2>&1)
          PR_NUM=$(echo "$PR_URL" | grep -oP '\d+$')
          # Wait a moment then merge; use || true so release doesn't fail if merge fails
          sleep 5
          gh pr merge "$PR_NUM" --squash --admin --delete-branch || echo "⚠️ Dev bump PR merge failed — manual merge may be needed for PR #${PR_NUM}"
